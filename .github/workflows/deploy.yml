name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options: [all, backend, monitoring]

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ── 변경된 경로 감지 ───────────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            monitoring:
              - 'infra/**'

  # ── Job 1: Backend ────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend — Build → ECR → SSM
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event.inputs.target == 'backend' ||
      github.event.inputs.target == 'all'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} \
            -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:latest \
            .
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Deploy to Backend EC2 via SSM
        run: |
          REPO_RAW="https://raw.githubusercontent.com/${{ github.repository }}/main"
          aws ssm send-command \
            --region '${{ secrets.AWS_REGION }}' \
            --document-name 'AWS-RunShellScript' \
            --targets 'Key=tag:App,Values=woori-backend' \
            --parameters "commands=[
              \"curl -fsSL ${REPO_RAW}/infra/scripts/deploy.sh -o /home/ubuntu/deploy.sh\",
              \"chmod +x /home/ubuntu/deploy.sh\",
              \"bash /home/ubuntu/deploy.sh\"
            ]" \
            --comment 'Deploy ${{ github.sha }} by ${{ github.actor }}'


  # ── Job 3: Monitoring ─────────────────────────────────────────────────────
  deploy-monitoring:
    name: Monitoring — Compose sync → SSM
    needs: changes
    if: |
      needs.changes.outputs.monitoring == 'true' ||
      github.event.inputs.target == 'monitoring' ||
      github.event.inputs.target == 'all'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync infra config and restart via SSM
        run: |
          REPO_RAW="https://raw.githubusercontent.com/${{ github.repository }}/main"
          aws ssm send-command \
            --region '${{ secrets.AWS_REGION }}' \
            --document-name 'AWS-RunShellScript' \
            --targets 'Key=tag:Name,Values=woori-monitoring-01' \
            --parameters "commands=[
              \"mkdir -p /home/ubuntu/prometheus /home/ubuntu/grafana/provisioning/dashboards /home/ubuntu/grafana/provisioning/datasources\",
              \"curl -fsSL ${REPO_RAW}/infra/docker-compose.yml -o /home/ubuntu/docker-compose.yml\",
              \"curl -fsSL ${REPO_RAW}/infra/prometheus/prometheus.yml -o /home/ubuntu/prometheus/prometheus.yml\",
              \"curl -fsSL ${REPO_RAW}/infra/grafana/provisioning/datasources/datasources.yml -o /home/ubuntu/grafana/provisioning/datasources/datasources.yml\",
              \"curl -fsSL ${REPO_RAW}/infra/grafana/provisioning/dashboards/dashboards.yml -o /home/ubuntu/grafana/provisioning/dashboards/dashboards.yml\",
              \"curl -fsSL ${REPO_RAW}/infra/grafana/provisioning/dashboards/asv.json -o /home/ubuntu/grafana/provisioning/dashboards/asv.json\",
              \"curl -fsSL ${REPO_RAW}/infra/grafana/provisioning/dashboards/errors.json -o /home/ubuntu/grafana/provisioning/dashboards/errors.json\",
              \"curl -fsSL ${REPO_RAW}/infra/grafana/provisioning/dashboards/external_api.json -o /home/ubuntu/grafana/provisioning/dashboards/external_api.json\",
              \"curl -fsSL ${REPO_RAW}/infra/grafana/provisioning/dashboards/financial.json -o /home/ubuntu/grafana/provisioning/dashboards/financial.json\",
              \"curl -fsSL ${REPO_RAW}/infra/grafana/provisioning/dashboards/node_exporter.json -o /home/ubuntu/grafana/provisioning/dashboards/node_exporter.json\",
              \"curl -fsSL ${REPO_RAW}/infra/grafana/provisioning/dashboards/voice_pipeline.json -o /home/ubuntu/grafana/provisioning/dashboards/voice_pipeline.json\",
              \"docker compose -f /home/ubuntu/docker-compose.yml up -d prometheus blackbox-exporter\",
              \"docker compose -f /home/ubuntu/docker-compose.yml up -d --force-recreate grafana\",
              \"docker compose -f /home/ubuntu/docker-compose.yml ps\"
            ]" \
            --comment 'Monitoring deploy by ${{ github.actor }}'

[SERVICE]
    Flush            1
    Log_Level        info
    Parsers_File     parsers.conf
    storage.type     filesystem
    storage.path     /fluent-bit/storage

[INPUT]
    Name             tail
    Path             /logs/app.log
    Parser           json_log
    Tag              woori.app
    DB               /fluent-bit/db/app.db
    storage.type     filesystem
    Mem_Buf_Limit    10MB
    Skip_Long_Lines  On

# transfer_executed / auto_transfer_executed / agent_auto_transfer_registered
# → woori.audit 태그로 복사 (keep=true: 원본 woori.app도 유지 → 이중 기록)
[FILTER]
    Name             rewrite_tag
    Match            woori.app
    Rule             $event ^(transfer_executed|auto_transfer_executed|agent_auto_transfer_registered)$ woori.audit true
    Emitter_Name     re_emitted

[OUTPUT]
    Name             opensearch
    Match            woori.audit
    Host             ${OPENSEARCH_HOST}
    Port             ${OPENSEARCH_PORT}
    HTTP_User        ${OPENSEARCH_USER}
    HTTP_Passwd      ${OPENSEARCH_PASSWORD}
    tls              On
    tls.verify       Off
    Index            transfer_audit
    Suppress_Type_Name On
    Retry_Limit      3

[OUTPUT]
    Name             opensearch
    Match            woori.app
    Host             ${OPENSEARCH_HOST}
    Port             ${OPENSEARCH_PORT}
    HTTP_User        ${OPENSEARCH_USER}
    HTTP_Passwd      ${OPENSEARCH_PASSWORD}
    tls              On
    tls.verify       Off
    Index            app_logs
    Suppress_Type_Name On
    Retry_Limit      3

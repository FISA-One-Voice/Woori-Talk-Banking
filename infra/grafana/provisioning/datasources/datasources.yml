apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: OpenSearch
    type: grafana-opensearch-datasource
    uid: opensearch
    url: https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}
    editable: false
    jsonData:
      version: "2.17.0"
      flavor: opensearch
      database: "app_logs"
      timeField: timestamp
      tlsSkipVerify: true
      logMessageField: message
      logLevelField: level
    secureJsonData:
      basicAuthPassword: "${OPENSEARCH_PASSWORD}"
    basicAuth: true
    basicAuthUser: ${OPENSEARCH_USER}

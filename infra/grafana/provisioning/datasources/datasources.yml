apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: OpenSearch
    type: grafana-opensearch-datasource
    uid: opensearch
    url: https://${OPENSEARCH_HOST}:${OPENSEARCH_PORT}
    editable: false
    jsonData:
      version: "3.3.2"
      flavor: opensearch
      database: "app_logs"
      timeField: timestamp
      tlsSkipVerify: true
      logMessageField: message
      logLevelField: level
    secureJsonData:
      basicAuthPassword: "${OPENSEARCH_PASSWORD}"
    basicAuth: true
    basicAuthUser: ${OPENSEARCH_USER}

  - name: PostgreSQL
    type: postgres
    uid: postgres
    url: ${POSTGRES_HOST}:${POSTGRES_PORT}
    editable: false
    jsonData:
      database: ${POSTGRES_DATABASE}
      sslmode: require
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
      timezone: "Asia/Seoul"
    secureJsonData:
      password: "${POSTGRES_PASSWORD}"
    user: ${POSTGRES_USER}

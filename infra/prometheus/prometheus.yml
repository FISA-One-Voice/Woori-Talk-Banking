global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── 아키텍처 주의 ─────────────────────────────────────────────────────────────
# Prometheus는 Monitoring EC2에서 실행되고, 앱·node-exporter는 별도의 Backend EC2에
# 있습니다. 따라서 타깃은 Backend EC2의 VPC 내부 사설 IP여야 합니다.
#   10.0.138.226 = woori-backend EC2 Private IPv4 (인스턴스 교체 시 갱신)
# host.docker.internal / 서비스명(node-exporter)은 단일 호스트 전제라 여기선 동작하지 않음.
# ─────────────────────────────────────────────────────────────────────────────

scrape_configs:
  - job_name: "woori-backend"
    static_configs:
      - targets: ["10.0.138.226:8000"]
    metrics_path: /metrics

  - job_name: "woori-node"
    static_configs:
      - targets: ["10.0.138.226:9100"]

  - job_name: "woori-healthcheck"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://10.0.138.226:8000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox-exporter:9115

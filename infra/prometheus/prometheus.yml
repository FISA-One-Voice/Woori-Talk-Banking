global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Monitoring EC2 배포 전 필수 수정 ──────────────────────────────────────────
# 10.0.138.226: Backend EC2의 VPC 내부 사설 IP로 교체하세요.
# AWS Console → EC2 → woori-backend-01 → Private IPv4 address 에서 확인.
# 예: 10.0.1.42
# ─────────────────────────────────────────────────────────────────────────────

scrape_configs:
  - job_name: "woori-backend"
    static_configs:
      - targets: ["10.0.138.226:8000"]
    metrics_path: /metrics

  - job_name: "woori-node"
    static_configs:
      - targets: ["10.0.138.226:9100"]

  - job_name: "woori-healthcheck"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://10.0.138.226:8000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox-exporter:9115
